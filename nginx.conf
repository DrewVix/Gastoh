events {
    worker_connections 1024;
}

http {
    upstream gastoh {
        server app:3000;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name gastoh.yourdomain.com;  # <-- Change this

        ssl_certificate     /etc/letsencrypt/live/gastoh.yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/gastoh.yourdomain.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 10m;

        location / {
            proxy_pass         http://gastoh;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
